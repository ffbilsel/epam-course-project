# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "chore: initialize SpecKit scaffolding for Copilot agent"

# Auto-commit before/after core commands.
# Constitution Principle VIII (Commit & Push Discipline) requires
# that every after_* hook stays enabled. Disabling an entry requires
# a constitutional amendment.
auto_commit:
  default: true
  before_clarify:
    enabled: true
    message: "chore(spec): snapshot before /speckit.clarify"
  before_plan:
    enabled: true
    message: "chore(spec): snapshot before /speckit.plan"
  before_tasks:
    enabled: true
    message: "chore(spec): snapshot before /speckit.tasks"
  before_implement:
    enabled: true
    message: "chore(spec): snapshot before /speckit.implement"
  before_checklist:
    enabled: true
    message: "chore(spec): snapshot before /speckit.checklist"
  before_analyze:
    enabled: true
    message: "chore(spec): snapshot before /speckit.analyze"
  before_taskstoissues:
    enabled: true
    message: "chore(spec): snapshot before /speckit.taskstoissues"
  after_constitution:
    enabled: true
    message: "docs(constitution): update via /speckit.constitution"
  after_specify:
    enabled: true
    message: "docs(spec): update via /speckit.specify"
  after_clarify:
    enabled: true
    message: "docs(spec): clarifications via /speckit.clarify"
  after_plan:
    enabled: true
    message: "docs(plan): update via /speckit.plan"
  after_tasks:
    enabled: true
    message: "docs(tasks): update via /speckit.tasks"
  after_implement:
    enabled: true
    message: "feat: implementation progress via /speckit.implement"
  after_checklist:
    enabled: true
    message: "docs(checklist): update via /speckit.checklist"
  after_analyze:
    enabled: true
    message: "docs(analyze): report via /speckit.analyze"
  after_taskstoissues:
    enabled: true
    message: "chore(issues): sync via /speckit.taskstoissues"