name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

env:
  CI: "true"
  NEXTAUTH_SECRET: "ci-test-secret-not-for-production-use-only"
  DATABASE_URL: "file:./data/innovatepam.db"
  BOOTSTRAP_ADMIN_EMAIL: "admin@innovatepam.test"

jobs:
  quality:
    name: Lint, Typecheck, Format, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Apply migrations
        run: npm run db:migrate

      - name: Seed reference data
        run: npm run db:seed

      - name: Unit + integration tests with coverage
        run: npx vitest run --coverage

      - name: Error-code coverage gate
        run: npm run check:error-codes

      - name: UI-token gate
        run: npm run check:ui-tokens

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: project/coverage
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: project
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Apply migrations
        run: npm run db:migrate

      - name: Seed reference data
        run: npm run db:seed

      - name: Build
        run: npm run build

      - name: Seed bootstrap admin (E2E account)
        run: npm run db:seed:admin
        env:
          BOOTSTRAP_ADMIN_EMAIL: admin@innovatepam.test
          BOOTSTRAP_ADMIN_PASSWORD: Passw0rd!2024
          BOOTSTRAP_ADMIN_NAME: E2E Admin

      - name: Run E2E
        run: npm run test:e2e
        env:
          E2E_ADMIN_EMAIL: admin@innovatepam.test
          E2E_ADMIN_PASSWORD: Passw0rd!2024

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: project/playwright-report
          if-no-files-found: ignore
